name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0
    
    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'
        
    - name: Determine Version
      id: versioning
      run: |
        if [[ $GITHUB_REF == refs/tags/v* ]]; then
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "IS_RELEASE=true" >> $GITHUB_OUTPUT
          echo "IS_RELEASE=true" >> $GITHUB_ENV
        else
          COMMIT_COUNT=$(git rev-list --count HEAD)
          VERSION="$COMMIT_COUNT"
          echo "IS_RELEASE=false" >> $GITHUB_OUTPUT
          echo "IS_RELEASE=false" >> $GITHUB_ENV
        fi
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "VERSION=$VERSION" >> $GITHUB_ENV

    - name: Update Version in Properties
      run: |
        sed -i "s/version=INDEV/version=${{ steps.versioning.outputs.VERSION }}/" gradle.properties
    
    - name: Make gradlew executable
      run: chmod +x ./gradlew
      
    - name: Build with Gradle
      run: ./gradlew build shadowJar
      
    - name: Generate Changelog
      id: changelog
      if: ${{ steps.versioning.outputs.IS_RELEASE == 'true' }}
      run: |
        echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
        PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
        if [ -z "$PREV_TAG" ]; then
          git log --pretty=format:"- %s" >> $GITHUB_OUTPUT
        else
          git log $PREV_TAG..HEAD --pretty=format:"- %s" >> $GITHUB_OUTPUT
        fi
        echo "" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Create Release
      if: ${{ steps.versioning.outputs.IS_RELEASE == 'true' }}
      uses: softprops/action-gh-release@v2
      with:
        files: build/libs/AntiNetherite-*-all.jar
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload build artifacts
      if: ${{ steps.versioning.outputs.IS_RELEASE == 'false' }}
      uses: actions/upload-artifact@v4
      with:
        name: AntiNetherite-${{ env.VERSION }}
        path: build/libs

    - name: Publish to Modrinth
      if: ${{ steps.versioning.outputs.IS_RELEASE == 'true' }}
      uses: kir-antipov/mc-publish@v3.3
      with:
        modrinth-id: "48MWikJI"
        modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
        files: build/libs/AntiNetherite-*-all.jar
        name: AntiNetherite ${{ env.VERSION }}
        version: ${{ env.VERSION }}
        changelog: ${{ steps.changelog.outputs.CHANGELOG }}
        loaders: |
          paper
          folia
          purpur
        game-versions: |
          1.21.x
          1.20.x
          