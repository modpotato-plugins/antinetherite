name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0
    
    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'
        
    - name: Determine Version
      id: versioning
      run: |
        if [[ $GITHUB_REF == refs/tags/v* ]]; then
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "IS_RELEASE=true" >> $GITHUB_ENV
        else
          COMMIT_COUNT=$(git rev-list --count HEAD)
          VERSION="$COMMIT_COUNT"
          echo "IS_RELEASE=false" >> $GITHUB_ENV
        fi
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "VERSION=$VERSION" >> $GITHUB_ENV

    - name: Update Version in Properties
      run: |
        sed -i "s/version=INDEV/version=${{ steps.versioning.outputs.VERSION }}/" gradle.properties
    
    - name: Make gradlew executable
      run: chmod +x ./gradlew
      
    - name: Build with Gradle
      run: ./gradlew build shadowJar
      
    - name: Create Release
      if: env.IS_RELEASE == 'true'
      uses: softprops/action-gh-release@v1
      with:
        files: build/libs/AntiNetherite-*-all.jar
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload build artifacts
      if: env.IS_RELEASE == 'false'
      uses: actions/upload-artifact@v4
      with:
        name: AntiNetherite-${{ env.VERSION }}
        path: build/libs

    - name: Publish to Modrinth
      if: env.IS_RELEASE == 'true'
      uses: kir-antipov/mc-publish@v3.3
      with:
        modrinth-id: "ab7RsjrW"
        modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
        files: build/libs/AntiNetherite-*-all.jar
        name: AntiNetherite ${{ env.VERSION }}
        version: ${{ env.VERSION }}
        loaders: |
          paper
          folia
        game-versions: |
          1.21.4
          1.21.3
          1.21.2
          1.21.1
          1.21
          1.21.5
          1.21.6
          1.21.7
          1.21.8
          1.21.9
          1.21.10
          1.21.11
          